<html>
<head>
    <title>Student Login</title>
</head>
<body>
<style>
    body{
        background-image: url('/static/images/img24.jpg');
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: flex;
    }
    .login-container {
        width: 300px;
        margin: 50px auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        backdrop-filter: blur(10px);
        background-color: rgba(255, 255, 255, 0.15) !important;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .login-container h2 {
        color: #fff !important;
        font-family: 'Segoe UI', sans-serif;
        font-weight: 600;
        letter-spacing: 1px;
    }
    .form-group label {
        color: #eee;
        font-size: 14px;
        margin-bottom: 8px;
        display: block;
    }
    .form-group input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: rgba(255, 255, 255, 0.9);
        margin-bottom: 10px;
        outline: none;
    }
    .login-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        margin-top: 10px;
    }
    .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(16, 250, 8, 0.732);
    }
    .footer-links {
        text-align: center;
        margin-top: 20px;
    }
    .footer-links button {
         width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        margin-top: 10px;
        
    }
    .register:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(84, 187, 243, 0.878);
    }
    .login-container h2 {
        text-align: center;
        color: #e5ebe5;
        margin-bottom: 20px;
    }
    .form-group{
        padding: 6px;

    }
    .login-container button{
        padding: 6px;
        border-spacing: 6px;
    }
    a{
        text-decoration: none;
        color: white;
    }
</style>

<div class="login-container">
    <div class="st"><h2>Student Login</h2></div>

    {% if messages %}
        {% for message in messages %}
            <p style="color: #ff4d4d; text-align: center; font-size: 14px;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer-links">
        <button class="register"><a href="{% url 'register' %}">Register As new.</a></button>
    </div>
</div>    
f
</body>
</html>
